name: Publish npm package

on:
  release:
    types:
      - published
  workflow_dispatch: {}

permissions:
  contents: read
  id-token: write

concurrency:
  group: npm-publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        env:
          REF_SHA: ${{ github.sha }}
          REPOSITORY: ${{ github.repository }}
          SERVER_URL: ${{ github.server_url }}
        run: |
          git init .
          git remote add origin "$SERVER_URL/$REPOSITORY"
          git fetch --depth=1 origin "$REF_SHA"
          git checkout --detach FETCH_HEAD

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          package-manager-cache: false

      - name: Update npm
        run: npm install -g npm@11

      - name: Install dependencies
        run: npm install --ignore-scripts --package-lock=false

      - name: Check release version
        run: |
          PACKAGE_NAME="$(node -p "require('./package.json').name")"
          PACKAGE_VERSION="$(node -p "require('./package.json').version")"
          echo "PACKAGE_NAME=$PACKAGE_NAME" >> "$GITHUB_ENV"
          echo "PACKAGE_VERSION=$PACKAGE_VERSION" >> "$GITHUB_ENV"

          if [ "$GITHUB_EVENT_NAME" = "release" ]; then
            RELEASE_VERSION="${GITHUB_REF_NAME#v}"
            if [ "$RELEASE_VERSION" != "$PACKAGE_VERSION" ]; then
              echo "::error::Release tag $GITHUB_REF_NAME does not match package version $PACKAGE_VERSION"
              exit 1
            fi
          fi

          if npm view "$PACKAGE_NAME@$PACKAGE_VERSION" version >/dev/null 2>&1; then
            echo "::error::$PACKAGE_NAME@$PACKAGE_VERSION is already published"
            exit 1
          fi

      - name: Test package
        run: npm test

      - name: Build package
        run: npm run build --if-present

      - name: Check package contents
        run: npm pack --dry-run

      - name: Dry-run publish
        if: ${{ github.event_name == 'workflow_dispatch' }}
        run: npm publish --dry-run --access public --tag latest

      - name: Publish package
        if: ${{ github.event_name == 'release' }}
        run: npm publish --provenance --access public --tag latest
